    <style>
        :root {
            --accent-rgb: 249, 115, 22;
            --accent: rgb(var(--accent-rgb));
            --bg-base: #030305;
            --bg-panel: rgba(10,10,15,0.4);
            --bg-modal: rgba(5,5,10,0.85);
            --bg-card: rgba(20,20,25,0.6);
            --bg-input: rgba(255,255,255,0.06);

            --border-color: rgba(255,255,255,0.08);
            --overlay: rgba(0,0,0,0.8);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 40px);
        }

        [data-theme="light"] {
            --bg-base: #f5f5f7;
            --bg-panel: rgba(255,255,255,0.8);
            --bg-modal: rgba(255,255,255,0.95);
            --bg-card: rgba(255,255,255,0.6);
            --bg-input: rgba(0,0,0,0.05);
            --text-main: #111115;
            --text-muted: #666677;
            --border-color: rgba(0,0,0,0.06);
            --overlay: rgba(255,255,255,0.8);
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Space Mono', monospace; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }
        
        /* Glassmorphism & UI Utilities */
        .glass-heavy { 
            background: var(--bg-modal); 
            backdrop-filter: blur(32px) saturate(180%); 
            -webkit-backdrop-filter: blur(32px) saturate(180%); 
            border: 1px solid var(--border-color); 
            box-shadow: 0 16px 40px rgba(0,0,0,0.2);
        }
        .glass-card { 
            background: var(--bg-card); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid var(--border-color); 
        }

        /* Enhanced Touch & Interaction Animations */
        .spring-anim { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hover-bounce:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 30px rgba(var(--accent-rgb),0.15); }
        .active-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .active-bounce:active { transform: scale(0.9) !important; opacity: 0.8; }
        
        /* Ripple effect for navigation and primary buttons */
        .touch-ripple { position: relative; overflow: hidden; }
        .touch-ripple::after {
            content: ""; display: block; position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; pointer-events: none;
            background-image: radial-gradient(circle, var(--text-main) 10%, transparent 10.01%);
            background-repeat: no-repeat; background-position: 50%;
            transform: scale(10, 10); opacity: 0; transition: transform .5s, opacity 1s;
        }
        .touch-ripple:active::after { transform: scale(0, 0); opacity: .15; transition: 0s; }
        
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideUpBouncy { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        .animate-in { animation: fadeUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .slide-up { animation: slideUpBouncy 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea, select, [contenteditable] { caret-color: var(--accent); color: var(--text-main); outline: none; background: transparent; }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }
        
        /* Tags & Buttons */
        .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.3); color: var(--accent); font-size: 10px; font-weight: 700; padding: 8px 14px; border-radius: 999px; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .tag-chip:hover { background: var(--accent); color: #fff; transform: scale(1.05); box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3); }
        
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.4); }
        .btn-secondary { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); }
        
        /* Viewer Specifics */
        .viewer-overlay { position: fixed; inset: 0; z-index: 500; background: var(--bg-base); display: flex; flex-direction: column; overflow: hidden;}
        
        /* Cinematic background layers for video viewer */
        .cinematic-wrapper { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; min-height: 35vh; max-height: 50vh; background: #000; overflow: hidden; border-bottom: 1px solid var(--border-color);}
        .cinematic-bg { position: absolute; inset: -20%; background: var(--accent); opacity: 0.15; filter: blur(60px); z-index: 0; border-radius: 50%; animation: pulse 8s infinite alternate;}
        .cinematic-layer { position: absolute; border: 1px solid rgba(255,255,255,0.05); border-radius: 32px; z-index: 1; pointer-events: none;}
        .layer-1 { inset: 10px; opacity: 0.2; background: rgba(var(--accent-rgb), 0.05); }
        .layer-2 { inset: 30px; opacity: 0.4; background: rgba(var(--accent-rgb), 0.08); border-radius: 24px;}
        .layer-3 { inset: 50px; opacity: 0.6; background: rgba(var(--accent-rgb), 0.1); border-radius: 16px;}
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.2); opacity: 0.25; } }

        .viewer-media-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
        .viewer-media { max-width: 100%; max-height: 100%; object-fit: contain; width: auto; height: auto; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .action-bar-sticky { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-around; padding: 12px; background: var(--bg-modal); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); z-index: 40; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .action-btn-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .action-btn-col:hover { color: var(--accent); transform: scale(1.05); }
        .action-btn-col.active { color: var(--accent); }

        /* Watch Section (Reels/Videos) */
        .watch-header { position: absolute; top: 0; inset-x: 0; z-index: 100; padding: var(--safe-top) 20px 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); pointer-events: none; }
        
        .reels-container { position: absolute; inset: 0; z-index: 10; background: #000; overflow-y: scroll; scroll-snap-type: y mandatory; padding-bottom: 80px; }
        .reel-snap { scroll-snap-align: start; scroll-snap-stop: always; height: calc(100dvh - 80px); width: 100%; position: relative; }

        .video-feed-container { position: absolute; inset: 0; z-index: 10; background: var(--bg-base); overflow-y: scroll; padding: calc(var(--safe-top) + 60px) 16px 100px 16px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(72px + var(--safe-bottom)); background: var(--bg-modal); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 400; padding-bottom: var(--safe-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px; height: 50px; color: var(--text-muted); transition: color 0.3s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; border-radius: 50%;}
        .nav-item.active { color: var(--text-main); }
        .nav-item:active { transform: scale(0.85); background: var(--bg-input); }
        .nav-fab { width: 44px; height: 44px; border-radius: 16px; background: var(--text-main); color: var(--bg-base); display: flex; align-items: center; justify-content: center; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .nav-fab:active { transform: scale(0.8); }

        /* Tab tap animation */
        @keyframes navTap { 0% { transform: scale(1); } 30% { transform: scale(0.72); } 65% { transform: scale(1.18); } 100% { transform: scale(1); } }
        @keyframes navGlow { 0% { box-shadow: 0 0 0px rgba(var(--accent-rgb),0); } 40% { box-shadow: 0 0 18px 4px rgba(var(--accent-rgb),0.45); } 100% { box-shadow: 0 0 0px rgba(var(--accent-rgb),0); } }
        .nav-tapped { animation: navTap 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, navGlow 0.5s ease forwards; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
        Search, Sparkles, X, Link as LinkIcon, FileText, Play, Send, Bot,
        Folder, Trash2, Settings, Star, Share2, Loader, Plus, ChevronLeft, 
        ChevronDown, ChevronUp, MessageSquare, Heart, Bookmark, LayoutGrid, 
        Grid3X3, List, Layout, Square, Download, Tag, Mail, Key, Edit3, Clapperboard,
        Volume2, VolumeX, MoreHorizontal, Home as HomeIcon, User, Moon, Sun, Palette, Code, Camera
    } from 'lucide-react';
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, onSnapshot, query, addDoc, doc, deleteDoc, updateDoc } from "firebase/firestore";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "firebase/auth";

    // Firebase Initialization
    const firebaseConfig = { apiKey: "AIzaSyCeblEX23K0Ezqh0Qf3SL4K72tTeyZ4tqI", authDomain: "pixelvault-bfbba.firebaseapp.com", projectId: "pixelvault-bfbba", storageBucket: "pixelvault-bfbba.firebasestorage.app", messagingSenderId: "407841785304", appId: "1:407841785304:web:9a132f1bc3aaf60e791ead" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const APP_ID = 'nexus-v8';

    const THEMES = { orange: '249, 115, 22', cyan: '6, 182, 212', green: '34, 197, 94', purple: '168, 85, 247', rose: '244, 63, 94', pintrest: '230, 0, 35' };

    // Utility Functions
    const getDomain = (url) => { try { return new URL(url.startsWith('http')?url:`https://${url}`).hostname.replace('www.', ''); } catch(e) { return 'Local'; } };

    const getMediaType = (url) => {
        if (!url) return 'link';
        const s = url.toLowerCase();
        if (s.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/)) return 'youtube';
        if (s.includes('.m3u8')) return 'hls';
        if (s.match(/\.(mp4|webm|ogg)(\?.*)?$/) || s.startsWith('data:video')) return 'video';
        if (s.match(/\.(mp3|wav|m4a|aac)(\?.*)?$/) || s.startsWith('data:audio')) return 'audio';
        if (s.match(/\.(jpg|jpeg|png|gif|webp|avif|bmp)(\?.*)?$/) || s.startsWith('data:image')) return 'image';
        return 'link';
    };

    const formatDuration = (sec) => {
        if (!sec || !isFinite(sec)) return '';
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
        return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m}:${s.toString().padStart(2,'0')}`;
    };

    const formatNumber = (num) => {
        if (!num) return '0';
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    const generateVideoMeta = (url, type) => {
        return new Promise((resolve) => {
            const video = document.createElement('video');
            video.crossOrigin = 'anonymous'; video.muted = true; video.playsInline = true;
            
            const finish = (thumb, duration, isPortrait) => { resolve({ thumb, duration, isPortrait }); video.pause(); video.removeAttribute('src'); video.load(); };
            
            video.addEventListener('loadeddata', () => { video.currentTime = isFinite(video.duration) ? Math.min(2, video.duration * 0.1) : 1; });
            video.addEventListener('seeked', () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 360;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    const isPortrait = canvas.height > canvas.width;
                    finish(canvas.toDataURL('image/jpeg', 0.6), video.duration, isPortrait);
                } catch (e) { finish(null, video.duration, false); }
            });
            video.addEventListener('error', () => finish(null, null, false));
            setTimeout(() => finish(null, video.duration || null, false), 8000);

            if (type === 'hls' && window.Hls && window.Hls.isSupported()) {
                const hls = new window.Hls({ startLevel: 0, maxBufferLength: 2, enableWorker: false });
                hls.loadSource(url); hls.attachMedia(video);
            } else { video.src = url; }
        });
    };

    const handleAIQuery = async (aiConfig, prompt, isJson = false) => {
        const { provider, key, url, model } = aiConfig;
        const sysMsg = isJson ? "Analyze the content. Return ONLY a raw, valid JSON object. No markdown, no backticks." : "Provide extremely short, sharp, fast, and precise answers. Go straight to the point.";

        if (provider === 'native' || provider === 'gemini') {
            const apiKey = provider === 'native' ? "" : key; 
            const endpoint = provider === 'native' 
                ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`
                : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: sysMsg }] } };
            const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            const d = await r.json();
            if (d.error) throw new Error(d.error.message);
            return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
        } 
        return '';
    };

    /* ═══ AUTHENTICATION COMPONENT ═══ */
    const AuthScreen = () => {
        const [mode, setMode] = useState('login'); const [email, setEmail] = useState(''); const [pass, setPass] = useState('');
        const [loading, setLoading] = useState(false);
        const execAuth = async (action) => {
            setLoading(true);
            try {
                if (action === 'google') await signInWithPopup(auth, new GoogleAuthProvider());
                else if (action === 'anon') await signInAnonymously(auth);
                else mode === 'signup' ? await createUserWithEmailAndPassword(auth, email, pass) : await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
            setLoading(false);
        };
        return (
            <div className="min-h-screen flex items-center justify-center p-4">
                <div className="w-full max-w-sm glass-heavy rounded-[32px] p-8 text-center animate-in">
                    <div className="w-20 h-20 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-6 spring-anim hover-bounce border border-accent/30"><Sparkles className="w-10 h-10 text-accent" /></div>
                    <h1 className="syne text-3xl font-extrabold mb-8 tracking-tight">NEXUS</h1>
                    <div className="space-y-4">
                        {mode === 'login' || mode === 'signup' ? (
                            <div className="space-y-4 animate-in">
                                <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-4 rounded-2xl bg-[var(--bg-input)] border border-[var(--border-color)] focus:border-accent spring-anim" />
                                <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full p-4 rounded-2xl bg-[var(--bg-input)] border border-[var(--border-color)] focus:border-accent spring-anim" />
                                <button onClick={()=>execAuth('email')} className="btn-action btn-primary active-bounce">{loading ? <Loader className="w-5 h-5 animate-spin"/> : 'Initialize Connection'}</button>
                                <button onClick={()=>setMode(mode==='login'?'signup':'login')} className="text-xs font-bold text-[var(--text-muted)] mt-2 hover:text-[var(--text-main)] spring-anim">Switch Mode</button>
                            </div>
                        ) : null}
                        <div className="flex gap-3">
                            <button onClick={()=>execAuth('google')} className="btn-action btn-secondary active-bounce flex-1"><Mail className="w-5 h-5"/> Google</button>
                            <button onClick={()=>execAuth('anon')} className="btn-action btn-secondary active-bounce flex-1"><Key className="w-5 h-5"/> Guest</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    /* ═══ MASONRY LAYOUT ═══ */
    const PinterestMasonry = ({ items, onSelect, onUpdate }) => {
        const [cols, setCols] = useState(2);
        
        useEffect(() => {
            const updateCols = () => setCols(window.innerWidth >= 768 ? 3 : 2);
            updateCols();
            window.addEventListener('resize', updateCols);
            return () => window.removeEventListener('resize', updateCols);
        }, []);

        const columns = Array.from({ length: cols }, () => []);
        items.forEach((item, i) => columns[i % cols].push(item));

        return (
            <div className="flex gap-3 md:gap-4 items-start">
                {columns.map((col, colIndex) => (
                    <div key={colIndex} className="flex-1 flex flex-col gap-3 md:gap-4">
                        {col.map(item => (
                            <div key={item.id} onClick={() => onSelect(item)} className="flex flex-col cursor-pointer group spring-anim">
                                <div className="relative rounded-[20px] overflow-hidden bg-[var(--bg-input)] w-full active-bounce">
                                    {item.thumb || (item.type === 'image' ? item.url : null) ? (
                                        <img src={item.thumb || item.url} className="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                                    ) : item.type === 'embed' ? (
                                        <div className="w-full aspect-[4/5] relative bg-black overflow-hidden">
                                            <iframe 
                                                srcDoc={`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:12px;color:#f0f0f0;font-family:'Space Mono',monospace;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:90vh;background:#000;text-align:center;overflow:hidden;}h1,h2,h3{font-family:'Syne',sans-serif;margin:0 0 8px 0;font-size:2rem;color:white;}p{margin:0;color:#888899;font-weight:bold;text-transform:uppercase;letter-spacing:1px;font-size:12px;}</style></head><body><div id="weather"></div><div id="app"></div><div id="root"></div>${item.content}</body></html>`}
                                                className="w-full h-full border-none pointer-events-none"
                                                sandbox="allow-scripts allow-same-origin"
                                                scrolling="no"
                                            />
                                        </div>
                                    ) : (
                                        <div className="w-full aspect-[4/5] flex flex-col items-center justify-center p-4 opacity-60">
                                            {item.type === 'note' ? <FileText className="w-8 h-8 text-accent"/> : <LinkIcon className="w-8 h-8 text-[var(--text-muted)]"/>}
                                        </div>
                                    )}
                                    <div className="absolute top-2 right-2 flex flex-col gap-2 z-10 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        <button onClick={(e) => { e.stopPropagation(); onUpdate(item.id, { pinned: !item.pinned }); }} className={`w-10 h-10 rounded-full backdrop-blur flex items-center justify-center hover:scale-110 active-bounce shadow-md ${item.pinned ? 'bg-accent text-white' : 'bg-black/60 text-white'}`}><Bookmark className={`w-4 h-4 ${item.pinned ? 'fill-white' : ''}`}/></button>
                                        <button onClick={(e) => { e.stopPropagation(); onUpdate(item.id, { liked: !item.liked }); }} className={`w-10 h-10 rounded-full backdrop-blur flex items-center justify-center hover:scale-110 active-bounce shadow-md ${item.liked ? 'bg-accent text-white' : 'bg-black/60 text-white'}`}><Heart className={`w-4 h-4 ${item.liked ? 'fill-white' : ''}`}/></button>
                                    </div>
                                    <div className="absolute top-3 left-3 flex gap-1 z-10">
                                        {['video','hls','youtube'].includes(item.type) && <div className="w-6 h-6 rounded-full bg-black/80 backdrop-blur flex items-center justify-center shadow-lg"><Play className="w-3 h-3 text-white fill-white ml-0.5"/></div>}
                                    </div>
                                    {item.duration && (
                                        <div className="absolute bottom-3 right-3 z-10">
                                            <span className="bg-black/80 backdrop-blur-md px-2 py-1 rounded-md text-[10px] text-white font-bold tracking-widest shadow-lg">{formatDuration(item.duration)}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="pt-2 px-1 flex flex-col">
                                    <h4 className="text-sm font-bold text-[var(--text-main)] leading-tight line-clamp-2">{item.title || 'Untitled Node'}</h4>
                                    <div className="flex items-center gap-1 mt-1 opacity-80">
                                        {item.type === 'note' || item.type === 'embed' ? null : <div className="w-4 h-4 rounded-full bg-[var(--bg-input)] flex items-center justify-center overflow-hidden shrink-0"><LinkIcon className="w-2 h-2 text-[var(--text-muted)]"/></div>}
                                        <span className="text-[10px] text-[var(--text-muted)] font-bold truncate">{getDomain(item.site || item.url)}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                ))}
            </div>
        );
    };

    /* ═══ WATCH SECTION (Reels & Videos) ═══ */
    const ReelPlayer = ({ item, isActive, isMuted, toggleMute }) => {
        const videoRef = useRef(null);
        useEffect(() => {
            if (!videoRef.current || !item.url) return;
            if (item.type === 'hls' && window.Hls && window.Hls.isSupported()) {
                const hls = new window.Hls({ startLevel: 0, enableWorker: false });
                hls.loadSource(item.url); hls.attachMedia(videoRef.current);
            }
        }, [item]);
        useEffect(() => {
            if (isActive) videoRef.current?.play().catch(e => console.log("Autoplay prevented:", e));
            else { videoRef.current?.pause(); if(videoRef.current) videoRef.current.currentTime = 0; }
        }, [isActive]);
        return (
            <div className="relative w-full h-full bg-black cursor-pointer" onClick={toggleMute}>
                <video ref={videoRef} src={item.type==='video'?item.url:undefined} className="w-full h-full object-cover" loop playsInline muted={isMuted} />
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/50 p-4 rounded-full pointer-events-none transition-opacity duration-500 opacity-0 data-[show=true]:opacity-100" data-show={isMuted && isActive}>
                    <VolumeX className="w-8 h-8 text-white" />
                </div>
            </div>
        );
    };

    const ReelsFeed = ({ reels, onUpdate }) => {
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isMuted, setIsMuted] = useState(true);
        const containerRef = useRef(null);

        const handleScroll = (e) => {
            const index = Math.round(e.target.scrollTop / (window.innerHeight - 80));
            if(index !== currentIndex && index >= 0 && index < reels.length) setCurrentIndex(index);
        };

        if(reels.length === 0) return (
            <div className="absolute inset-0 z-10 flex items-center justify-center flex-col animate-in pb-20">
                <Clapperboard className="w-16 h-16 text-white/30 mb-4"/>
                <p className="text-white/50 font-bold uppercase tracking-widest text-sm">No Portrait Transmissions</p>
            </div>
        );

        return (
            <div className="reels-container hide-scroll animate-in" onScroll={handleScroll} ref={containerRef}>
                <button onClick={() => setIsMuted(!isMuted)} className="fixed top-24 right-4 z-[60] w-10 h-10 rounded-full bg-black/40 backdrop-blur border border-white/10 flex items-center justify-center text-white active-bounce">
                    {isMuted ? <VolumeX className="w-4 h-4"/> : <Volume2 className="w-4 h-4"/>}
                </button>

                {reels.map((reel, index) => {
                    const isActive = index === currentIndex;
                    return (
                        <div key={reel.id} className="reel-snap">
                            <ReelPlayer item={reel} isActive={isActive} isMuted={isMuted} toggleMute={() => setIsMuted(!isMuted)} />
                            <div className="absolute bottom-0 inset-x-0 p-4 pb-6 bg-gradient-to-t from-black/90 via-black/40 to-transparent pointer-events-none flex items-end justify-between z-10">
                                <div className="flex-1 pr-16 pointer-events-auto">
                                    <h2 className="text-white font-bold text-lg leading-tight mb-2 drop-shadow-md">{reel.title || 'Unknown Entity'}</h2>
                                    {reel.description && <p className="text-white/80 text-xs line-clamp-2 mb-2 drop-shadow-md">{reel.description}</p>}
                                    <div className="flex flex-wrap gap-2">
                                        {(reel.tags || []).slice(0,3).map(t => <span key={t} className="text-[10px] bg-white/20 text-white px-2 py-1 rounded-md font-bold drop-shadow-sm">{t}</span>)}
                                    </div>
                                </div>
                            </div>
                            <div className="absolute bottom-6 right-4 flex flex-col gap-6 z-20 pointer-events-auto items-center">
                                <button onClick={() => onUpdate(reel.id, { liked: !reel.liked })} className="flex flex-col items-center gap-1 active-bounce hover:scale-110 spring-anim"><div className={`w-12 h-12 rounded-full flex items-center justify-center bg-black/40 backdrop-blur ${reel.liked ? 'text-accent' : 'text-white'}`}><Heart className={`w-6 h-6 ${reel.liked ? 'fill-accent' : ''}`}/></div></button>
                                <button onClick={() => onUpdate(reel.id, { pinned: !reel.pinned })} className="flex flex-col items-center gap-1 active-bounce hover:scale-110 spring-anim"><div className={`w-12 h-12 rounded-full flex items-center justify-center bg-black/40 backdrop-blur ${reel.pinned ? 'text-accent' : 'text-white'}`}><Bookmark className={`w-6 h-6 ${reel.pinned ? 'fill-accent' : ''}`}/></div></button>
                                <button onClick={() => { try { navigator.clipboard.writeText(reel.url); alert("Copied"); } catch(err) { document.execCommand('copy'); } }} className="flex flex-col items-center gap-1 active-bounce hover:scale-110 spring-anim"><div className="w-12 h-12 rounded-full flex items-center justify-center bg-black/40 backdrop-blur text-white"><Share2 className="w-6 h-6"/></div></button>
                            </div>
                        </div>
                    )
                })}
            </div>
        );
    };

    const VideoFeed = ({ videos, onSelectVideo }) => {
        if(videos.length === 0) return (
            <div className="absolute inset-0 z-10 flex items-center justify-center flex-col animate-in pb-20">
                <Play className="w-16 h-16 text-[var(--text-muted)] mb-4 opacity-30"/>
                <p className="text-[var(--text-muted)] font-bold uppercase tracking-widest text-sm">No Landscape Media</p>
            </div>
        );

        return (
            <div className="video-feed-container hide-scroll animate-in">
                <div className="max-w-3xl mx-auto space-y-6">
                    <h2 className="text-[var(--text-main)] syne text-xl font-bold px-2">Trending</h2>
                    {videos.map(v => (
                        <div key={v.id} onClick={() => onSelectVideo(v)} className="group cursor-pointer active-bounce bg-[var(--bg-card)] rounded-[24px] p-3 border border-[var(--border-color)] hover:border-accent/40 spring-anim shadow-sm">
                            <div className="aspect-video bg-black rounded-[16px] overflow-hidden relative mb-3">
                                {v.thumb || v.type==='youtube' ? (
                                    <img src={v.thumb || (v.type==='youtube' ? `https://img.youtube.com/vi/${v.url?.match(/([A-Za-z0-9_-]{11})/)?.[1]}/hqdefault.jpg` : null)} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy"/>
                                ) : (
                                    <div className="w-full h-full flex items-center justify-center"><Play className="w-10 h-10 text-white/30"/></div>
                                )}
                                <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                                    <div className="w-14 h-14 rounded-full bg-black/50 backdrop-blur border border-white/20 flex items-center justify-center shadow-lg transform scale-90 group-hover:scale-100 spring-anim">
                                        <Play className="w-6 h-6 text-white fill-white ml-1"/>
                                    </div>
                                </div>
                                {v.duration && (
                                    <div className="absolute bottom-2 right-2">
                                        <span className="bg-black/80 backdrop-blur px-2 py-1 rounded-md text-xs text-white font-bold tracking-wider">{formatDuration(v.duration)}</span>
                                    </div>
                                )}
                            </div>
                            <div className="flex gap-3 px-1 items-start">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-accent to-purple-500 shrink-0 flex items-center justify-center text-white font-bold text-lg overflow-hidden border border-white/10 shadow-sm">
                                    {(v.artist || v.title || '?')[0].toUpperCase()}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <h4 className="font-bold text-[var(--text-main)] text-sm md:text-base leading-tight line-clamp-2 mb-1">{v.title || 'Unknown Transmition'}</h4>
                                    <div className="flex items-center text-[10px] md:text-xs text-[var(--text-muted)] font-bold uppercase tracking-wider">
                                        <span className="truncate">{v.artist || getDomain(v.site || v.url)}</span>
                                        <span className="mx-1.5">•</span>
                                        <span>{formatNumber((v.savedAt%1000)*432)} Views</span>
                                    </div>
                                </div>
                                <button className="p-2 text-[var(--text-muted)] hover:text-[var(--text-main)] active-bounce rounded-full hover:bg-[var(--bg-input)]"><MoreHorizontal className="w-5 h-5"/></button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    const WatchSection = ({ items, onUpdate, onSelectVideo, onBack }) => {
        const [subTab, setSubTab] = useState('videos'); // 'reels' or 'videos'
        
        // Categorize media loosely
        const allMedia = useMemo(() => items.filter(i => ['video', 'hls', 'youtube'].includes(i.type)), [items]);
        // Ideally we'd filter by orientation. Since we might not have it reliable, let's split artificially or rely on 'isPortrait' flag if exists.
        const reels = useMemo(() => allMedia.filter(i => i.isPortrait !== false), [allMedia]); 
        const videos = useMemo(() => allMedia.filter(i => i.isPortrait === false || !i.isPortrait), [allMedia]);

        return (
            <div className="absolute inset-0 bg-black">
                {/* Top Navigation Overlay */}
                <div className="watch-header">
                    <button onClick={onBack} className="w-10 h-10 rounded-full flex items-center justify-center pointer-events-auto active-bounce touch-ripple text-white"><ChevronLeft className="w-7 h-7"/></button>
                    <div className="flex gap-6 font-bold pointer-events-auto text-lg syne tracking-wide text-white">
                        <button className={`spring-anim relative ${subTab==='reels'?'opacity-100 scale-105':'opacity-50 hover:opacity-80'}`} onClick={()=>setSubTab('reels')}>
                            Reels
                            {subTab==='reels' && <span className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-accent"></span>}
                        </button>
                        <button className={`spring-anim relative ${subTab==='videos'?'opacity-100 scale-105':'opacity-50 hover:opacity-80'}`} onClick={()=>setSubTab('videos')}>
                            Videos
                            {subTab==='videos' && <span className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-accent"></span>}
                        </button>
                    </div>
                    <button className="w-10 h-10 rounded-full flex items-center justify-center pointer-events-auto active-bounce touch-ripple text-white"><Camera className="w-6 h-6"/></button>
                </div>

                {/* Content Area */}
                {subTab === 'reels' ? (
                    <ReelsFeed reels={allMedia} onUpdate={onUpdate} /> // Passing all media to reels for testing, realistically filter by portrait
                ) : (
                    <VideoFeed videos={allMedia} onSelectVideo={onSelectVideo} />
                )}
            </div>
        )
    };

    /* ═══ ITEM VIEWER ═══ */
    const ItemViewer = ({ item, allItems, onClose, onUpdate, onDelete, onAI, onTagClick }) => {
        if (!item) return null;
        const [showTagInput, setShowTagInput] = useState(false); const [newTag, setNewTag] = useState('');
        const [showComments, setShowComments] = useState(false); const [newComment, setNewComment] = useState('');
        const [descExpanded, setDescExpanded] = useState(false); const [isEditingMeta, setIsEditingMeta] = useState(false);
        const [metaForm, setMetaForm] = useState({ artist: item.artist||'', character: item.character||'', source: item.source||'' });

        const tags = item.tags || []; const comments = item.comments || []; const cleanDomain = getDomain(item.url || item.site);
        const isVideoNode = ['video', 'hls', 'youtube'].includes(item.type);

        const related = useMemo(() => {
            return allItems.filter(i => i.id !== item.id && (
                (i.artist && i.artist === item.artist) || (i.character && i.character === item.character) ||
                (i.tags && item.tags && i.tags.some(t => item.tags.includes(t))) || (i.type === item.type)
            )).slice(0, 10);
        }, [item, allItems]);

        const toggleLike = () => onUpdate(item.id, { liked: !item.liked });
        const togglePin = () => onUpdate(item.id, { pinned: !item.pinned });
        const handleAddTag = (e) => { if (e.key === 'Enter' && newTag.trim()) { onUpdate(item.id, { tags: [...new Set([...tags, newTag.trim().toLowerCase()])] }); setNewTag(''); setShowTagInput(false); } };
        const removeTag = (t, e) => { e.stopPropagation(); onUpdate(item.id, { tags: tags.filter(tag => tag !== t) }); };
        const handleAddComment = () => { if (!newComment.trim()) return; onUpdate(item.id, { comments: [...comments, { text: newComment.trim(), date: Date.now() }] }); setNewComment(''); };
        const executeTagClick = (t) => { onClose(); if(onTagClick) onTagClick(t); }

        return (
            <div className="viewer-overlay animate-in">
                <div className="absolute top-0 left-0 right-0 p-4 z-50 flex justify-between items-center pointer-events-none mt-safe-top">
                    <button onClick={onClose} className="w-10 h-10 rounded-full bg-black/60 backdrop-blur border border-white/10 flex items-center justify-center text-white pointer-events-auto active-bounce shadow-lg touch-ripple"><ChevronLeft className="w-6 h-6"/></button>
                    <button onClick={() => onDelete(item.id)} className="w-10 h-10 rounded-full bg-black/60 backdrop-blur border border-white/10 flex items-center justify-center text-red-400 pointer-events-auto active-bounce shadow-lg touch-ripple"><Trash2 className="w-5 h-5"/></button>
                </div>

                {isVideoNode ? (
                    <div className="cinematic-wrapper">
                        {/* Cinematic background effect (AvdanOS style) */}
                        <div className="cinematic-bg"></div>
                        <div className="cinematic-layer layer-1"></div>
                        <div className="cinematic-layer layer-2"></div>
                        <div className="cinematic-layer layer-3"></div>
                        
                        <div className="viewer-media-container !p-8">
                            {item.type === 'youtube' ? (
                                <iframe src={`https://www.youtube.com/embed/${item.url?.match(/([A-Za-z0-9_-]{11})/)?.[1]}?autoplay=1`} className="viewer-media aspect-video w-full border-none shadow-2xl relative z-10" allowFullScreen allow="autoplay" />
                            ) : (
                                <video src={item.url} id={`vid-${item.id}`} controls autoPlay className="viewer-media shadow-2xl relative z-10" playsInline />
                            )}
                        </div>
                    </div>
                ) : (
                    <div className="viewer-media-container !min-h-[40vh] !bg-[var(--bg-panel)]">
                        {item.type === 'embed' ? (
                            <iframe 
                                srcDoc={`
                                    <!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
                                    <style>body{margin:0;padding:16px;color:#f0f0f0;font-family:'Space Mono',monospace;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:#000;text-align:center;}h1,h2,h3{font-family:'Syne',sans-serif;margin:0 0 8px 0;font-size:2rem;color:white;}p{margin:0;color:#888899;font-weight:bold;text-transform:uppercase;letter-spacing:2px;}</style>
                                    </head><body><div id="weather"></div><div id="app"></div><div id="root"></div>${item.content}</body></html>
                                `}
                                className="w-full h-full border-none bg-black" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                            />
                        ) : item.type === 'note' ? (
                            <div className="w-full h-full flex items-center justify-center p-8">
                                <p className="text-lg md:text-xl font-bold whitespace-pre-wrap text-center text-[var(--text-main)] max-h-[80vh] overflow-y-auto hide-scroll">{item.content}</p>
                            </div>
                        ) : (
                            <img src={item.thumb || item.url} className="viewer-media !max-h-[50vh]" />
                        )}
                    </div>
                )}
                
                {/* HLS initialization for viewer */}
                {item.type === 'hls' && React.useEffect(() => {
                    const v = document.getElementById(`vid-${item.id}`);
                    if(v && window.Hls && window.Hls.isSupported()) { const hls = new window.Hls(); hls.loadSource(item.url); hls.attachMedia(v); } 
                }, [item.url])}

                <div className="action-bar-sticky">
                    <div className={`action-btn-col active-bounce touch-ripple ${item.liked ? 'active' : ''}`} onClick={toggleLike}><Heart className={`w-6 h-6 ${item.liked ? 'fill-accent' : ''}`} /><span>Like</span></div>
                    <div className={`action-btn-col active-bounce touch-ripple ${item.pinned ? 'active' : ''}`} onClick={togglePin}><Bookmark className={`w-6 h-6 ${item.pinned ? 'fill-accent' : ''}`} /><span>Save</span></div>
                    <div className="action-btn-col active-bounce touch-ripple" onClick={() => setShowComments(true)}><MessageSquare className="w-6 h-6" /><span>{comments.length}</span></div>
                    <div className="action-btn-col active-bounce touch-ripple" onClick={()=>{ try{navigator.clipboard.writeText(item.url || item.content); alert("Copied");}catch(e){document.execCommand('copy');} }}><Share2 className="w-6 h-6" /><span>Share</span></div>
                    <div className="action-btn-col active-bounce touch-ripple !text-accent" onClick={() => onAI(item)}><Bot className="w-6 h-6" /><span>Auto-Tag</span></div>
                </div>

                <div className="flex-1 overflow-y-auto hide-scroll pb-32 bg-[var(--bg-base)]">
                    <div className="max-w-4xl mx-auto p-4 sm:p-6 space-y-6">
                        <div>
                            <h1 className="syne text-2xl md:text-3xl font-black break-words text-[var(--text-main)] leading-tight">{item.title || 'Unknown Entity'}</h1>
                            <div className="flex items-center gap-3 mt-2 text-xs font-bold uppercase tracking-widest">
                                <span className="text-[var(--text-muted)]">{new Date(item.savedAt||0).toLocaleDateString()}</span>
                                {item.url && <a href={item.url} target="_blank" className="text-accent bg-accent/10 px-3 py-1 rounded-md hover:bg-accent hover:text-white spring-anim border border-accent/20 flex items-center gap-1"><LinkIcon className="w-3 h-3"/> {cleanDomain}</a>}
                            </div>
                        </div>

                        <div className="bg-[var(--bg-input)] rounded-[24px] p-5 border border-[var(--border-color)] relative group shadow-sm">
                            <button onClick={()=>setIsEditingMeta(!isEditingMeta)} className="absolute top-4 right-4 text-[var(--text-muted)] hover:text-accent opacity-0 group-hover:opacity-100 transition-opacity active-bounce"><Edit3 className="w-4 h-4"/></button>
                            {isEditingMeta ? (
                                <div className="space-y-3">
                                    <div className="flex gap-2 items-center"><span className="w-20 text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest">Artist</span><input value={metaForm.artist} onChange={e=>setMetaForm({...metaForm, artist: e.target.value})} className="flex-1 bg-black/10 p-3 rounded-[12px] text-sm outline-none border border-transparent focus:border-accent" placeholder="Unknown..."/></div>
                                    <div className="flex gap-2 items-center"><span className="w-20 text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest">Character</span><input value={metaForm.character} onChange={e=>setMetaForm({...metaForm, character: e.target.value})} className="flex-1 bg-black/10 p-3 rounded-[12px] text-sm outline-none border border-transparent focus:border-accent" placeholder="Unknown..."/></div>
                                    <div className="flex gap-2 items-center"><span className="w-20 text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest">Series</span><input value={metaForm.source} onChange={e=>setMetaForm({...metaForm, source: e.target.value})} className="flex-1 bg-black/10 p-3 rounded-[12px] text-sm outline-none border border-transparent focus:border-accent" placeholder="Unknown..."/></div>
                                    <button onClick={()=>{ onUpdate(item.id, { ...metaForm }); setIsEditingMeta(false); }} className="w-full bg-accent text-white p-3 rounded-[16px] text-xs font-bold uppercase mt-2 active-bounce">Save Meta</button>
                                </div>
                            ) : (
                                <div className="grid grid-cols-[80px_1fr] gap-y-4 text-sm">
                                    <span className="text-[var(--text-muted)] font-bold text-xs uppercase tracking-widest self-center">Artist</span><span className={`font-bold ${item.artist ? 'text-accent cursor-pointer hover:underline' : 'text-[var(--text-muted)]'}`} onClick={()=>item.artist && executeTagClick(item.artist)}>{item.artist || 'Unknown'}</span>
                                    <span className="text-[var(--text-muted)] font-bold text-xs uppercase tracking-widest self-center">Character</span><span className={`font-bold ${item.character ? 'text-accent cursor-pointer hover:underline' : 'text-[var(--text-muted)]'}`} onClick={()=>item.character && executeTagClick(item.character)}>{item.character || 'Original'}</span>
                                    <span className="text-[var(--text-muted)] font-bold text-xs uppercase tracking-widest self-center">Series</span><span className={`font-bold ${item.source ? 'text-accent cursor-pointer hover:underline' : 'text-[var(--text-muted)]'}`} onClick={()=>item.source && executeTagClick(item.source)}>{item.source || 'Original'}</span>
                                </div>
                            )}
                        </div>

                        {item.description && (
                            <div className="bg-[var(--bg-input)] rounded-[24px] p-5 border border-[var(--border-color)] shadow-sm">
                                <p className={`text-sm text-[var(--text-main)] leading-relaxed whitespace-pre-wrap ${!descExpanded ? 'line-clamp-2' : ''}`}>{item.description}</p>
                                <button onClick={()=>setDescExpanded(!descExpanded)} className="text-xs font-bold text-accent mt-3 uppercase tracking-widest active-bounce">{descExpanded ? 'Show Less' : 'Read More'}</button>
                            </div>
                        )}

                        <div>
                            <h3 className="text-xs uppercase tracking-widest font-bold text-[var(--text-muted)] mb-3 flex items-center gap-2"><Tag className="w-4 h-4"/> Associated Tags</h3>
                            <div className="flex flex-wrap gap-2 items-center">
                                {tags.map(t => (
                                    <span key={t} onClick={() => executeTagClick(t)} className="tag-chip group relative pr-6 border-accent hover:bg-accent/80 active-bounce">
                                        {t} <button onClick={(e)=>removeTag(t, e)} className="absolute right-1.5 opacity-0 group-hover:opacity-100 text-white hover:text-red-300 transition-opacity"><X className="w-3 h-3"/></button>
                                    </span>
                                ))}
                                {showTagInput ? (
                                    <input autoFocus value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={handleAddTag} onBlur={()=>setShowTagInput(false)} placeholder="add tag..." className="tag-chip !bg-[var(--bg-input)] !border-dashed w-32 outline-none" />
                                ) : (
                                    <button onClick={()=>setShowTagInput(true)} className="px-3 py-1.5 rounded-full bg-[var(--bg-input)] flex items-center justify-center hover:bg-accent hover:text-white spring-anim border border-[var(--border-color)] text-xs font-bold active-bounce"><Plus className="w-3 h-3 mr-1"/> Add</button>
                                )}
                            </div>
                        </div>

                        {related.length > 0 && (
                            <div className="pt-8 border-t border-[var(--border-color)]">
                                <h3 className="text-xs uppercase tracking-widest font-bold text-[var(--text-muted)] mb-4 flex items-center gap-2"><Grid3X3 className="w-4 h-4"/> Similar Nodes</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-4">
                                    {related.map(r => (
                                        <div key={r.id} className="relative aspect-[4/5] rounded-[24px] overflow-hidden glass-card group cursor-pointer hover-bounce bg-[var(--bg-input)] shadow-sm" onClick={() => { onClose(); setTimeout(()=>onUpdate('view', r), 100); }}>
                                            {r.thumb || (r.type === 'image' ? r.url : null) ? <img src={r.thumb || r.url} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" /> : <div className="w-full h-full flex items-center justify-center"><LinkIcon className="w-8 h-8 text-[var(--text-muted)]"/></div>}
                                            <div className="absolute top-2 right-2 flex gap-1">
                                                {['video','hls','youtube'].includes(r.type) && <div className="w-8 h-8 rounded-full bg-black/60 backdrop-blur flex items-center justify-center"><Play className="w-3 h-3 text-white fill-white ml-0.5"/></div>}
                                            </div>
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex items-end p-4 opacity-0 group-hover:opacity-100 spring-anim">
                                                <span className="text-white text-xs font-bold truncate tracking-wide">{r.title || r.type}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>

                {/* Comment Drawer Overlay */}
                {showComments && (
                    <div className="fixed inset-x-0 bottom-0 z-[550] glass-heavy rounded-t-[32px] p-6 slide-up max-h-[75vh] flex flex-col border-t border-[var(--border-color)] shadow-[0_-10px_50px_rgba(0,0,0,0.5)]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="syne font-bold text-xl uppercase tracking-widest text-[var(--text-main)]">Discussion ({comments.length})</h3>
                            <button onClick={() => setShowComments(false)} className="w-10 h-10 bg-[var(--bg-input)] rounded-full flex items-center justify-center hover:bg-[var(--border-color)] spring-anim active-bounce touch-ripple"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-4 mb-6 hide-scroll">
                            {comments.map((c, i) => (
                                <div key={i} className="bg-[var(--bg-input)] p-4 rounded-[20px] border border-[var(--border-color)]">
                                    <p className="text-[10px] text-[var(--text-muted)] mb-2 uppercase tracking-widest font-bold">{new Date(c.date).toLocaleString()}</p>
                                    <p className="text-sm font-medium leading-relaxed">{c.text}</p>
                                </div>
                            ))}
                            {comments.length === 0 && <p className="text-center text-[var(--text-muted)] text-sm my-10 font-bold uppercase tracking-widest">No signals detected.</p>}
                        </div>
                        <div className="flex gap-3">
                            <input value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAddComment()} placeholder="Transmit message..." className="flex-1 bg-[var(--bg-input)] border border-[var(--border-color)] rounded-[20px] p-4 outline-none text-sm focus:border-accent spring-anim" />
                            <button onClick={handleAddComment} className="w-14 rounded-[20px] bg-accent flex justify-center items-center text-white active-bounce shadow-lg shadow-accent/30"><Send className="w-5 h-5"/></button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    /* ═══ SMART INJECT MODAL ═══ */
    const AddModal = ({ onClose, onSave }) => {
        const [inputVal, setInputVal] = useState(''); 
        const [fetching, setFetching] = useState(false);
        
        const handleSave = async () => {
            const val = inputVal.trim();
            if (!val) return;
            setFetching(true);
            
            // Smart auto-detect logic
            const isEmbed = /<iframe|<blockquote|<script|<embed|<object/i.test(val);
            const isUrl = (/^https?:\/\//i.test(val) || /^www\./i.test(val) || /^[^\s]+(?:\.com|\.net|\.org|\.io|\.xyz|\.co|\.me|\.m3u8|\.mp4|\.jpg|\.png|\.gif|\.webp|\.avif)(?:\/|$)/i.test(val)) && !/\s/.test(val);

            if (isEmbed) {
                await onSave({
                    url: '', content: val, type: 'embed', site: 'Embedded', collection: 'RAW', thumb: null, title: 'Embedded Content',
                    duration: null, isPortrait: false, tags: ['embed'], artist: '', character: '', source: '', description: ''
                });
            } else if (isUrl) {
                const safeUrl = val.startsWith('http') ? val : `https://${val}`;
                const type = getMediaType(safeUrl); let site = getDomain(safeUrl);
                let finalThumb = null; let finalDuration = null; let finalIsPortrait = false;
                if (['video','hls'].includes(type)) {
                    const vMeta = await generateVideoMeta(safeUrl, type);
                    finalThumb = vMeta.thumb; finalDuration = vMeta.duration; finalIsPortrait = vMeta.isPortrait;
                }
                await onSave({ 
                    url: safeUrl, type, site, collection: 'RAW', thumb: finalThumb, title: 'New Item', duration: finalDuration, 
                    isPortrait: finalIsPortrait, tags: [type], artist: '', character: '', source: '', description: ''
                });
            } else {
                const titleMatch = val.split('\n')[0].substring(0, 40);
                const title = titleMatch + (val.length > 40 ? '...' : '');
                await onSave({
                    url: '', content: val, type: 'note', site: 'Note', collection: 'Notes', thumb: null, title: title || 'Untitled Note',
                    duration: null, isPortrait: false, tags: ['note'], artist: '', character: '', source: '', description: val.substring(0, 100)
                });
            }
            
            setFetching(false); onClose();
        };

        return (
            <div className="fixed inset-0 z-[500] bg-[var(--overlay)] backdrop-blur-md flex items-end sm:items-center justify-center sm:p-4" onClick={e => e.target===e.currentTarget && onClose()}>
                <div className="w-full max-w-md glass-heavy rounded-t-[32px] sm:rounded-[32px] p-8 slide-up border border-[var(--border-color)] shadow-2xl">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="syne text-xl font-bold uppercase tracking-widest text-[var(--text-main)]">Inject Asset</h2>
                        <button onClick={onClose} className="w-10 h-10 bg-[var(--bg-input)] rounded-full flex items-center justify-center hover:bg-[var(--border-color)] spring-anim active-bounce"><X className="w-5 h-5"/></button>
                    </div>
                    
                    <textarea 
                        className="w-full p-5 rounded-[24px] mb-6 bg-[var(--bg-input)] border border-[var(--border-color)] outline-none focus:border-[var(--text-main)] spring-anim text-sm font-bold min-h-[160px] resize-none shadow-inner" 
                        placeholder="Write a note, paste a link (m3u8, web), or drop embed HTML code..." 
                        value={inputVal} 
                        onChange={e=>setInputVal(e.target.value)} 
                    />
                    <button onClick={handleSave} disabled={fetching} className="btn-action btn-primary active-bounce text-sm shadow-xl shadow-accent/20 touch-ripple">{fetching ? <Loader className="w-5 h-5 animate-spin"/> : 'Upload Node'}</button>
                </div>
            </div>
        );
    };

    /* ═══ MAIN APPLICATION CONTROLLER ═══ */
    function App() {
        const [user, setUser] = useState(null);
        const [items, setItems] = useState([]);
        const [search, setSearch] = useState('');
        const [activeTag, setActiveTag] = useState('');
        const [typeFilter, setTypeFilter] = useState('all'); 
        
        const [currentTab, setCurrentTab] = useState('home'); // home, search, watch, settings
        const [layoutMode, setLayoutMode] = useState(() => localStorage.getItem('nxs_layout') || 'grid'); 
        const [selectedItem, setSelectedItem] = useState(null);
        const [showAdd, setShowAdd] = useState(false);
        
        const [theme, setTheme] = useState(() => localStorage.getItem('nxs_theme') || 'dark');
        const [appColor, setAppColor] = useState(() => localStorage.getItem('nxs_color') || 'pintrest');
        const [aiConfig, setAiConfig] = useState(() => ({ provider: localStorage.getItem('nxs_ai_provider') || 'native', key: localStorage.getItem('nxs_ai_key') || '', model: localStorage.getItem('nxs_ai_model') || '' }));

        useEffect(() => { localStorage.setItem('nxs_layout', layoutMode); }, [layoutMode]);
        useEffect(() => { 
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light'); 
            else document.documentElement.removeAttribute('data-theme'); 
            localStorage.setItem('nxs_theme', theme); 
        }, [theme]);
        useEffect(() => { 
            const rgb = THEMES[appColor] || THEMES.pintrest; 
            document.documentElement.style.setProperty('--accent-rgb', rgb); 
            document.documentElement.style.setProperty('--accent', `rgb(${rgb})`); 
            localStorage.setItem('nxs_color', appColor); 
        }, [appColor]);

        useEffect(() => { const unsub = onAuthStateChanged(auth, u => setUser(u)); return unsub; }, []);
        useEffect(() => {
            if (!user) return;
            const unsub = onSnapshot(query(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items')), snap => {
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.pinned ? 1 : 0) > (a.pinned ? 1 : 0) ? 1 : -1 || (b.savedAt||0) - (a.savedAt||0));
                setItems(data);
            });
            return unsub;
        }, [user]);

        const triggerAIAutoTag = async (docId, contentToAnalyze, type) => {
            if(!aiConfig.provider || (aiConfig.provider !== 'native' && !aiConfig.key)) return;
            try {
                const prompt = `Analyze this context (URL or Text Content): ${contentToAnalyze}. Type: ${type}. Return ONLY a JSON object with these exact keys: "title" (short descriptive title, do not use raw URLs), "description" (1-2 sentences), "artist" (name or "Unknown"), "character" (name or "Original"), "source" (series/site or "Original"), "tags" (array of 3-5 relevant lowercase tags).`;
                const res = await handleAIQuery(aiConfig, prompt, true);
                let jsonStr = res;
                if(res.includes('```json')) jsonStr = res.split('```json')[1].split('```')[0];
                const data = JSON.parse(jsonStr.trim());
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', docId), {
                    title: data.title && data.title.length < 50 ? data.title : 'Processed Media',
                    description: data.description || '', artist: data.artist || 'Unknown',
                    character: data.character || 'Original', source: data.source || getDomain(contentToAnalyze), tags: data.tags || [type]
                });
            } catch(e) { console.log("AI Auto-tag silent fail"); }
        };

        const handleSave = async (data) => {
            const docRef = await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items'), { ...data, savedAt: Date.now(), pinned: false, liked: false, comments: [] });
            const aiTarget = data.url || data.content;
            if(aiTarget) triggerAIAutoTag(docRef.id, aiTarget, data.type);
        };
        const handleUpdate = async (id, data) => {
            if (id === 'view') return setSelectedItem(data);
            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', id), data);
            if (selectedItem?.id === id) setSelectedItem(prev => ({...prev, ...data}));
        };
        const handleDelete = async (id) => {
            if (!confirm('Purge asset?')) return;
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'vault_items', id));
            setSelectedItem(null);
        };
        const handleAI = async (item) => { triggerAIAutoTag(item.id, item.url || item.content, item.type); alert("AI extraction triggered. Metadata will update shortly."); };

        const filteredItems = useMemo(() => {
            return items.filter(i => {
                const term = search.toLowerCase();
                const matchSearch = !term || [i.title, i.artist, i.character, i.source, ...(i.tags||[])].some(v => (v||'').toLowerCase().includes(term));
                const matchTag = !activeTag || (i.tags && i.tags.includes(activeTag)) || i.artist === activeTag || i.character === activeTag || i.source === activeTag;
                const matchType = typeFilter === 'all' || i.type === typeFilter || (typeFilter === 'video' && ['hls','youtube'].includes(i.type));
                return matchSearch && matchTag && matchType;
            });
        }, [items, search, activeTag, typeFilter]);

        if (!user) return <AuthScreen />;

        const isList = layoutMode === 'list'; const isBento = layoutMode === 'bento'; const isFeed = layoutMode === 'feed'; const isPinterestGrid = layoutMode === 'grid';
        const filters = ['All', 'Video', 'Image', 'Link', 'Note'];

        const allTags = Array.from(new Set(items.flatMap(i => i.tags || []))).slice(0, 30);

        return (
            <div className="min-h-screen relative">
                
                {/* === HOME TAB === */}
                {currentTab === 'home' && (
                    <main className="max-w-4xl mx-auto p-4 pt-6 pb-32">
                        {/* Filter Tags */}
                        <div className="flex gap-2 overflow-x-auto hide-scroll pb-3 mb-3">
                            {filters.map(f => (
                                <button key={f} onClick={()=>setTypeFilter(f.toLowerCase())} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap spring-anim transition-all active-bounce touch-ripple ${typeFilter === f.toLowerCase() ? 'bg-[var(--text-main)] text-[var(--bg-base)] shadow-md' : 'bg-[var(--bg-input)] text-[var(--text-main)] hover:bg-[var(--border-color)]'}`}>
                                    {f}
                                </button>
                            ))}
                        </div>
                        {activeTag && (
                            <div className="flex items-center mb-5">
                                <span onClick={() => setActiveTag('')} className="tag-chip !bg-[var(--text-main)] !text-[var(--bg-base)] flex items-center gap-1 shadow-md px-4 py-2 text-xs rounded-full active-bounce touch-ripple">
                                    <Tag className="w-3 h-3"/> {activeTag} <X className="w-3 h-3 ml-1"/>
                                </span>
                            </div>
                        )}
                        
                        {isPinterestGrid ? (
                            <PinterestMasonry items={filteredItems} onSelect={setSelectedItem} onUpdate={handleUpdate} />
                        ) : (
                            <div className={`grid gap-3 md:gap-4 ${isBento ? 'grid-flow-dense' : ''} ${
                                layoutMode === 'compact' ? 'grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2' : 
                                layoutMode === 'bento' ? 'grid-cols-2 md:grid-cols-3' :
                                layoutMode === 'feed' ? 'grid-cols-1 max-w-xl mx-auto' : 'grid-cols-1'
                            }`}>
                                {filteredItems.map((item, index) => {
                                    const bentoWide = isBento && (index % 3 === 2);
                                    return (
                                        <div key={item.id} onClick={() => setSelectedItem(item)} className={`glass-card overflow-hidden cursor-pointer group relative border border-transparent hover:border-accent/50 spring-anim ${
                                            isList ? 'flex h-28 rounded-[24px] hover-bounce active-bounce' : 
                                            layoutMode === 'compact' ? 'aspect-square rounded-[20px] hover-bounce active-bounce' : 
                                            isBento ? (bentoWide ? 'col-span-2 aspect-video rounded-[32px] hover-bounce active-bounce' : 'col-span-1 aspect-square rounded-[32px] hover-bounce active-bounce') :
                                            isFeed ? 'flex flex-col rounded-[32px] mb-4 bg-[var(--bg-modal)] shadow-lg active-bounce' : ''
                                        }`}>
                                            <div className={`relative bg-black/40 ${isList ? 'w-28 h-full shrink-0' : isFeed ? 'w-full aspect-[4/5] sm:aspect-[3/4]' : 'w-full h-full'}`}>
                                                {item.thumb || (item.type === 'image' ? item.url : null) ? (
                                                    <img src={item.thumb || item.url} className={`w-full h-full ${isFeed ? 'object-cover' : 'object-cover'}`} loading="lazy" />
                                                ) : item.type === 'embed' ? (
                                                    <div className="w-full h-full relative bg-black overflow-hidden">
                                                        <iframe 
                                                            srcDoc={`<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:12px;color:#f0f0f0;font-family:'Space Mono',monospace;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:90vh;background:#000;text-align:center;overflow:hidden;}h1,h2,h3{font-family:'Syne',sans-serif;margin:0 0 8px 0;font-size:2rem;color:white;}p{margin:0;color:#888899;font-weight:bold;text-transform:uppercase;letter-spacing:1px;font-size:12px;}</style></head><body><div id="weather"></div><div id="app"></div><div id="root"></div>${item.content}</body></html>`}
                                                            className="w-full h-full border-none pointer-events-none" sandbox="allow-scripts allow-same-origin" scrolling="no"
                                                        />
                                                    </div>
                                                ) : (
                                                    <div className="w-full h-full flex flex-col items-center justify-center p-2 opacity-60">
                                                        {item.type === 'note' ? <FileText className="w-8 h-8 text-accent"/> : <LinkIcon className="w-8 h-8 text-[var(--text-muted)]"/>}
                                                        {(isBento && !bentoWide) || isFeed && <span className="text-[10px] font-bold mt-2 uppercase tracking-widest text-[var(--text-muted)] truncate max-w-full px-2">{getDomain(item.site || item.url)}</span>}
                                                    </div>
                                                )}
                                                <div className="absolute top-3 right-3 flex gap-1 z-10">
                                                    {item.pinned && <div className="w-8 h-8 rounded-full bg-accent/90 backdrop-blur flex items-center justify-center shadow-lg"><Bookmark className="w-4 h-4 text-white fill-white"/></div>}
                                                    {['video','hls','youtube'].includes(item.type) && <div className="w-8 h-8 rounded-full bg-black/80 backdrop-blur flex items-center justify-center shadow-lg"><Play className="w-4 h-4 text-white fill-white ml-0.5"/></div>}
                                                    {item.type === 'note' && <div className="w-8 h-8 rounded-full bg-[var(--text-main)] backdrop-blur flex items-center justify-center shadow-lg"><FileText className="w-4 h-4 text-[var(--bg-base)]"/></div>}
                                                </div>
                                                {item.duration && (
                                                    <div className="absolute bottom-3 right-3 z-10">
                                                        <span className="bg-black/80 backdrop-blur-md px-2 py-1 rounded-md text-[10px] text-white font-bold tracking-widest shadow-lg">{formatDuration(item.duration)}</span>
                                                    </div>
                                                )}
                                            </div>

                                            {isList ? (
                                                <div className="p-4 flex flex-col justify-center flex-1 min-w-0">
                                                    <h4 className="text-sm font-bold truncate text-[var(--text-main)] mb-1">{item.title || 'Untitled Node'}</h4>
                                                    {item.type !== 'note' && item.type !== 'embed' && <p className="text-[10px] text-[var(--text-muted)] uppercase tracking-widest truncate">{getDomain(item.site || item.url)}</p>}
                                                </div>
                                            ) : isFeed ? (
                                                <div className="p-6 flex flex-col gap-4">
                                                    <div className="flex items-center gap-4 border-b border-[var(--border-color)] pb-4">
                                                        <Heart className={`w-6 h-6 ${item.liked ? 'fill-accent text-accent' : 'text-[var(--text-muted)]'}`} />
                                                        <Bookmark className={`w-6 h-6 ${item.pinned ? 'fill-accent text-accent' : 'text-[var(--text-muted)]'}`} />
                                                        <MessageSquare className="w-6 h-6 text-[var(--text-muted)]" />
                                                        <div className="flex-1"></div>
                                                        {item.type !== 'note' && item.type !== 'embed' && <span className="text-[10px] text-[var(--text-muted)] uppercase tracking-widest font-bold">{getDomain(item.site || item.url)}</span>}
                                                    </div>
                                                    <div>
                                                        <h4 className="text-xl font-bold text-[var(--text-main)] leading-tight">{item.title || 'Untitled Node'}</h4>
                                                        <span className="text-[10px] text-[var(--text-muted)] uppercase tracking-widest block mt-2">{new Date(item.savedAt||0).toLocaleString()}</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="absolute inset-x-0 bottom-0 p-4 pt-16 bg-gradient-to-t from-black/95 via-black/60 to-transparent flex flex-col justify-end pointer-events-none">
                                                    <h4 className="text-xs md:text-sm font-bold text-white truncate drop-shadow-md">{item.title || 'Untitled Node'}</h4>
                                                    {isBento && bentoWide && item.type !== 'note' && item.type !== 'embed' && <p className="text-[10px] text-white/70 uppercase tracking-widest mt-1 font-bold">{item.type} // {getDomain(item.site || item.url)}</p>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {filteredItems.length === 0 && <div className="text-center mt-32 opacity-40 font-bold uppercase tracking-widest text-sm">Nothing Found</div>}
                    </main>
                )}

                {/* === SEARCH TAB === */}
                {currentTab === 'search' && (
                    <div className="max-w-4xl mx-auto p-4 pt-8 animate-in pb-32">
                        <div className="bg-[var(--bg-input)] rounded-full flex items-center px-6 h-16 border border-[var(--border-color)] focus-within:border-[var(--text-main)] transition-colors mb-8 shadow-sm">
                            <Search className="w-6 h-6 text-[var(--text-main)] mr-3" />
                            <input autoFocus className="w-full bg-transparent outline-none font-bold text-lg text-[var(--text-main)]" placeholder="Search ideas, pins, tags..." value={search} onChange={e=>setSearch(e.target.value)} />
                            {search && <button onClick={()=>setSearch('')} className="active-bounce"><X className="w-6 h-6 text-[var(--text-muted)]"/></button>}
                        </div>

                        {!search ? (
                            <div>
                                <h3 className="text-sm font-bold mb-4 px-2 text-[var(--text-main)]">Ideas for you</h3>
                                <div className="flex flex-wrap gap-2">
                                    {allTags.map(t => (
                                        <span key={t} onClick={() => { setActiveTag(t); setCurrentTab('home'); }} className="px-5 py-3 rounded-[24px] bg-[var(--bg-input)] text-[var(--text-main)] font-bold text-sm cursor-pointer hover:bg-[var(--border-color)] spring-anim active-bounce touch-ripple">
                                            {t}
                                        </span>
                                    ))}
                                    {allTags.length === 0 && <p className="text-xs text-[var(--text-muted)] p-2">Start adding tags to your items to see them here.</p>}
                                </div>
                            </div>
                        ) : (
                            <PinterestMasonry items={filteredItems} onSelect={setSelectedItem} onUpdate={handleUpdate} />
                        )}
                    </div>
                )}

                {/* === WATCH TAB (Reels / Videos) === */}
                {currentTab === 'watch' && (
                    <WatchSection items={items} onUpdate={handleUpdate} onSelectVideo={setSelectedItem} onBack={() => setCurrentTab('home')} />
                )}

                {/* === SETTINGS TAB === */}
                {currentTab === 'settings' && (
                    <div className="max-w-4xl mx-auto p-6 pt-10 animate-in space-y-10 pb-32">
                        <h1 className="text-3xl font-black text-[var(--text-main)] syne">Settings</h1>
                        
                        <div className="space-y-4">
                            <h3 className="text-xs uppercase tracking-widest font-bold text-[var(--text-muted)]">Appearance</h3>
                            <div className="flex gap-3">
                                <button onClick={()=>setTheme('light')} className={`flex-1 p-5 rounded-[24px] border active-bounce touch-ripple ${theme==='light' ? 'border-[var(--text-main)] bg-[var(--bg-input)] shadow-md' : 'border-[var(--border-color)]'} flex flex-col items-center gap-2 spring-anim`}>
                                    <Sun className="w-6 h-6"/> <span className="text-xs font-bold">Light</span>
                                </button>
                                <button onClick={()=>setTheme('dark')} className={`flex-1 p-5 rounded-[24px] border active-bounce touch-ripple ${theme==='dark' ? 'border-[var(--text-main)] bg-[var(--bg-input)] shadow-md' : 'border-[var(--border-color)]'} flex flex-col items-center gap-2 spring-anim`}>
